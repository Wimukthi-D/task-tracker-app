name: Deploy

on:
    workflow_run:
        workflows: ["CI"]
        types:
            - completed
        branches:
            - main

jobs:
    deploy:
        name: Deploy to Oracle VM
        runs-on: ubuntu-latest

        if: ${{ github.event.workflow_run.conclusion == 'success' }}

        steps:
            - name: Configure SSH
              run: |
                  set -e
                    mkdir -p ~/.ssh
                    printf '%s' "${{ secrets.ORACLE_SSH_KEY_BASE64 }}" | base64 --decode > ~/.ssh/oracle_deploy_key
                    chmod 600 ~/.ssh/oracle_deploy_key
                    echo "Checking decoded private key..."
                    test -s ~/.ssh/oracle_deploy_key
                    ssh-keygen -y -f ~/.ssh/oracle_deploy_key > /dev/null
                    echo "Private key is valid."
                    ssh-keyscan -H "${{ secrets.ORACLE_HOST }}" >> ~/.ssh/known_hosts

            - name: Deploy on Oracle server
              run: |
                  ssh -i ~/.ssh/oracle_deploy_key "${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }}" << 'EOF'
                   set -e
                   cd "${{ secrets.ORACLE_PROJECT_PATH }}"
                   git fetch origin main
                   git checkout main
                   git reset --hard origin/main
                   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
                   docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
                  EOF
