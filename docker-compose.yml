services:
  mysql:
    image: mysql:8.0
    container_name: task-tracker-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: task_tracker
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DATABASE_URL: mysql://root:root@mysql:3306/task_tracker
    container_name: task-tracker-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: mysql://root:root@mysql:3306/task_tracker

      JWT_ACCESS_SECRET: docker_access_secret
      ACCESS_TOKEN_EXPIRES_IN: 15m

      REFRESH_TOKEN_EXPIRES_IN_DAYS: 7
      REFRESH_TOKEN_COOKIE_NAME: refreshToken
      REFRESH_TOKEN_PEPPER: docker_refresh_token_pepper

      CORS_ORIGIN: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
    ports:
      - "5001:5001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5001/api
        VITE_SOCKET_URL: http://localhost:5001
    container_name: task-tracker-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
